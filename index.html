    <script>
      // Safeguard against environments/extensions trying to overwrite window.fetch
      // where it is configured as a read-only getter (such as inside sandboxed iframes).
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return originalFetch;
            },
            set: function(val) {
              originalFetch = val;
            }
          });
        } catch (e) {
          console.warn("Fetch safeguard warning:", e);
        }
      })();
    </script>
